# Netlify build config — on publie uniquement les fonctions.
# Le site lui-même reste servi par GitHub Pages (judoclubanderlecht.be).

[build]
  functions = "netlify/functions"
  publish   = "."

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["nodemailer"]

# Alias pratique : /api/send → /.netlify/functions/send
[[redirects]]
  from   = "/api/send"
  to     = "/.netlify/functions/send"
  status = 200
