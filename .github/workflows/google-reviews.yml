name: Sync Google Reviews

on:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday at 06:00 UTC
  workflow_dispatch: {}    # Allow manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch Google reviews via SerpAPI
        env:
          SERPAPI_KEY:     ${{ secrets.SERPAPI_KEY }}
          GOOGLE_PLACE_ID: ${{ secrets.GOOGLE_PLACE_ID }}
        run: python .github/scripts/fetch_google_reviews.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add google-reviews.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "chore: refresh Google reviews"
            git push
          fi
